### model
model_name_or_path: saves/video-o3-sft/ckpt-stage1
image_max_pixels: 262144 
video_max_pixels: 602112
video_min_pixels: 100352
video_maxlen: 768
min_token_number: 1024
max_token_number: 16384
trust_remote_code: true
mask_answer_from_first_video: True
mask_grounding_from_other_videos: True
mask_ratio: 0.1

# optional
# 4d mask 不支持flash-attn
enable_liger_kernel: True

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: false
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z1_config.json

### dataset
dataset: sft_data_stage2
template: qwen2_vl
cutoff_len: 40000
overwrite_cache: false
preprocessing_batch_size: 128
preprocessing_num_workers: 4
dataloader_num_workers: 2
accelerator_config:
  dispatch_batches: false
tokenized_path: saves/video-o3-sft/dataset/sft_stage2

### output
output_dir: saves/video-o3-sft/ckpt
logging_steps: 1
save_steps: 50
save_total_limit: 1
plot_loss: true
overwrite_output_dir: false
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
# ensure global batch size = 256
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

